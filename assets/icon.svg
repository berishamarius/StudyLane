<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="70%">
      <stop offset="0%"   stop-color="#2A2A3E"/>
      <stop offset="100%" stop-color="#1E1E2E"/>
    </radialGradient>
    <linearGradient id="g" x1="0" y1="0" x2="0" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#EDEDED"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="110" fill="url(#bg)"/>
  <!-- Border ring -->
  <rect x="8" y="8" width="496" height="496" rx="104" fill="none" stroke="rgba(237,237,237,0.20)" stroke-width="3"/>

  <!-- S (left glyph) – two arcs made of rounded rects forming stylised S -->
  <!-- Top arc of S -->
  <rect x="90"  y="110" width="160" height="52" rx="26" fill="url(#g)"/>
  <rect x="90"  y="110" width="52"  height="130" rx="26" fill="url(#g)"/>
  <rect x="90"  y="188" width="160" height="52" rx="26" fill="url(#g)"/>
  <rect x="198" y="188" width="52"  height="130" rx="26" fill="url(#g)"/>
  <rect x="90"  y="266" width="160" height="52" rx="26" fill="url(#g)"/>
  <!-- Fill corners for continuous look -->
  <rect x="90"  y="162" width="52"  height="52" fill="url(#g)"/>
  <rect x="198" y="240" width="52"  height="52" fill="url(#g)"/>

  <!-- L (right glyph) -->
  <rect x="276" y="110" width="52" height="210" rx="26" fill="url(#g)"/>
  <rect x="276" y="266" width="145" height="52" rx="26" fill="url(#g)"/>

  <!-- Weave cut: S right meets L left -->
  <rect x="276" y="188" width="52" height="52" fill="url(#bg)"/>
</svg>
